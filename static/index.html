<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Support Bot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .chat-box { width: 480px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.1); display: flex; flex-direction: column; height: 600px; }
  .header { background: #2c3e50; color: #fff; padding: 16px 20px; font-weight: 600; font-size: 16px; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
  .user { background: #2c3e50; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .bot { background: #f0f2f5; color: #1a1a1a; align-self: flex-start; border-bottom-left-radius: 4px; }
  .source { font-size: 10px; opacity: 0.6; margin-top: 4px; }
  .input-row { display: flex; padding: 12px; gap: 8px; border-top: 1px solid #eee; }
  input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
  button { background: #2c3e50; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>
<div class="chat-box">
  <div class="header">Support Bot</div>
  <div class="messages" id="msgs">
    <div class="msg bot">Hi! How can I help you today?</div>
  </div>
  <div class="input-row">
    <input id="inp" placeholder="Type your question..." onkeydown="if(event.key==='Enter')send()"/>
    <button onclick="send()">Send</button>
  </div>
</div>
<script>
const history = [];
async function send() {
  const inp = document.getElementById('inp');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  addMsg(msg, 'user');
  history.push({role: 'user', content: msg});
  const res = await fetch('/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({message: msg, history})
  });
  const data = await res.json();
  addMsg(data.answer, 'bot', data.source);
  history.push({role: 'assistant', content: data.answer});
}
function addMsg(text, role, source) {
  const msgs = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = text + (source ? `<div class="source">via ${source}</div>` : '');
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}
</script>
</body>
</html>
